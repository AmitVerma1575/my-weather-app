<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h1>Weather App 🌤️</h1>


    <div class="buttons">
        <label id="myLocation" class="btn">📍 My Location</label>
        <label id="search" class="btn">🔍 Search</label>
    </div>

    <input type="text" placeholder="Enter your location">

    <!-- Weather Result -->
    <div class="weather">
        <div class="city"></div>
        <div class="temp"></div>
        <div class="condition"></div>
    </div>

</div>

</body>
<script src="./script.js"></script>
</html>
